{% extends 'base.html' %}

{% block main %}
    <h1>Create new ticket</h1>

    <form method="post">
        <div class="form-group">
            <div class="form-label">Ticket Type:</div>
            <div class="form-element"><input type="text" name="ticket_type"></div>
        </div>

        <div class="form-group">
            <div class="form-label">Ticket Description:</div>
            <div class="form-element"><input type="text" name="ticket_desc"></div>
        </div>
    </form>
{% endblock %}
