<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>openSTS</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<nav>
    <a href="/dashboard">Dashboard</a>
    <a href="/signout">Sign out</a>
</nav>
<br>
<br>
    {% block main %}
        {% if session.user_email %}
            <p>You are logged in as {{ session.user_email }}.
            You have {{ session.user_type }} privileges.</p>
        {% else %}
            <p>You are not logged in. <a href="/login">Login</a>.</p>
        {% endif %}
    {% endblock %}

</body>
</html>
